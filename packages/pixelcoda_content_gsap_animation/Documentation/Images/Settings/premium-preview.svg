<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640" role="img" aria-labelledby="title desc">
  <title id="title">Full-width premium animation preview</title>
  <desc id="desc">A wide TYPO3 backend preview component with GreenSock branding, motion controls and headless-ready badges.</desc>
  <defs>
    <linearGradient id="surface" x1="64" y1="76" x2="1336" y2="564" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ecfccb"/>
      <stop offset=".38" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 136) rotate(44) scale(320 220)">
      <stop stop-color="#84cc16" stop-opacity=".36"/>
      <stop offset="1" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1138 226) rotate(126) scale(300 220)">
      <stop stop-color="#0f766e" stop-opacity=".28"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1400" height="640" fill="#111827"/>
  <rect x="64" y="76" width="1272" height="488" rx="18" fill="url(#surface)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="64" y="76" width="1272" height="488" rx="18" fill="url(#glowA)"/>
  <rect x="64" y="76" width="1272" height="488" rx="18" fill="url(#glowB)"/>

  <g transform="translate(100 110)">
