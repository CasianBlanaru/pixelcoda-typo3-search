    <rect x="28" y="28" width="108" height="26" rx="13" fill="#84cc16" fill-opacity=".22"/>
    <text x="82" y="46" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#0f766e">ScrollTrigger</text>
    <text x="28" y="100" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#111827">Animation preview</text>
    <text x="28" y="142" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">GSAP with reduced-motion support.</text>
    <line x1="28" y1="182" x2="332" y2="182" stroke="#cbd5e1"/>
    <text x="28" y="212" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#334155">Headless output is automatic.</text>
    <text x="28" y="238" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Use animationSettingsData in APIs.</text>
