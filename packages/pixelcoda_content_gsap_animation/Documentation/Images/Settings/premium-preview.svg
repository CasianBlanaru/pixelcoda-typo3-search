    <text x="58" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#134e4a">Preview</text>
  </g>

  <g transform="translate(1154 112)">
    <rect width="86" height="34" rx="17" fill="#ecfccb" stroke="#0f766e"/>
    <text x="43" y="23" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#0f766e">GSAP</text>
  </g>

  <g transform="translate(100 188)">
