<!DOCTYPE html>
<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:bk2k="http://typo3.org/ns/BK2K/BootstrapPackage/ViewHelpers" lang="en" class="no-js">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">

    <title>{data.title}</title>

    <f:if condition="{data.description}">
        <meta name="description" content="{data.description}">
    </f:if>

    <f:if condition="{data.keywords}">
        <meta name="keywords" content="{data.keywords}">
    </f:if>

    <!-- Bootstrap Package CSS and JS will be included automatically -->
    <f:render section="HeaderAssets" optional="true" />
</head>

<body class="{f:if(condition: data.backend_layout, then: 'layout-{data.backend_layout}', else: 'layout-default')}">

    <!-- Skip to main content link for accessibility -->
    <a class="sr-only sr-only-focusable" href="#main-content">Skip to main content</a>

    <!-- Header -->
    <header class="header" role="banner">
        <f:render section="Header" optional="true" />
    </header>

    <!-- Main Content -->
    <main id="main-content" role="main">
        <f:render section="Main" />
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <f:render section="Footer" optional="true" />
    </footer>

    <f:render section="FooterAssets" optional="true" />
</body>

</html>
