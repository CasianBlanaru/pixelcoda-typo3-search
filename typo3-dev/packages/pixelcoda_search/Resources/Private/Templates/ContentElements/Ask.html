<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:section name="main">
    <div class="pixelcoda-ask-content-element" role="main" aria-label="AI-powered Q&A">
        <div class="ask-container">
            <f:if condition="{data.header}">
                <h2 class="ask-header">{data.header}</h2>
            </f:if>
            
            <div class="ask-form-container">
                <form class="ask-form" method="get" role="search" aria-labelledby="ask-title">
                    <div class="form-group">
                        <label for="ask-question-{data.uid}" class="sr-only">
                            <f:translate key="ask.question.label" default="Ihre Frage" />
                        </label>
                        <input 
                            type="text" 
                            id="ask-question-{data.uid}" 
                            name="q" 
                            class="form-control ask-input" 
                            placeholder="{f:translate(key: 'ask.question.placeholder', default: 'Stellen Sie Ihre Frage...')}"
                            aria-describedby="ask-help-{data.uid}"
                            autocomplete="off"
                            required
                        />
                        <div id="ask-help-{data.uid}" class="form-text">
                            <f:translate key="ask.question.help" default="Geben Sie mindestens 3 Zeichen ein" />
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="ask-context-{data.uid}" class="form-label">
                            <f:translate key="ask.context.label" default="Zusätzlicher Kontext (optional)" />
                        </label>
                        <textarea 
                            id="ask-context-{data.uid}" 
                            name="context" 
                            class="form-control ask-context" 
                            rows="3"
                            placeholder="{f:translate(key: 'ask.context.placeholder', default: 'Geben Sie zusätzliche Informationen an, die bei der Beantwortung helfen könnten...')}"
                            aria-describedby="context-help-{data.uid}"
                        ></textarea>
                        <div id="context-help-{data.uid}" class="form-text">
                            <f:translate key="ask.context.help" default="Zusätzliche Informationen helfen der KI, bessere Antworten zu geben" />
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary ask-submit" aria-describedby="ask-status-{data.uid}">
                            <span class="btn-text">
                                <f:translate key="ask.submit" default="Frage stellen" />
                            </span>
                            <span class="btn-loading" style="display: none;" aria-hidden="true">
                                <f:translate key="ask.submitting" default="Wird verarbeitet..." />
                            </span>
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="ask-results" role="region" aria-live="polite" aria-label="Antworten" style="display: none;">
                <div class="ask-question-display">
                    <h3 class="question-title">
                        <f:translate key="ask.question.display" default="Frage:" />
                    </h3>
                    <p class="question-text"></p>
                </div>
                
                <div class="ask-answer">
                    <h4 class="answer-title">
                        <f:translate key="ask.answer.title" default="Antwort:" />
                    </h4>
                    <div class="answer-content"></div>
                    
                    <div class="answer-sources" style="display: none;">
                        <h5 class="sources-title">
                            <f:translate key="ask.sources.title" default="Quellen:" />
                        </h5>
                        <ul class="sources-list" role="list"></ul>
                    </div>
                </div>
            </div>
            
            <div class="ask-message alert alert-info" role="alert" style="display: none;"></div>
        </div>
    </div>
</f:section>

</html>
