<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="Main">
    <div class="search-results-container">
        <h1>Suchergebnisse</h1>

        <!-- Search Form -->
        <div class="search-form-wrapper">
            <form class="search-form" action="" method="get">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" name="q" value="{searchQuery}" placeholder="Website durchsuchen..." aria-label="Suchbegriff eingeben">
                    <button type="submit" class="search-button" aria-label="Suche starten">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <span>Suchen</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Message -->
        <f:if condition="{message}">
            <p class="search-message">{message}</p>
        </f:if>

        <!-- Results -->
        <f:if condition="{results}">
            <f:then>
                <div class="search-results">
                    <f:for each="{results}" as="result">
                        <article class="search-result-item">
                            <h2 class="search-result-title">
                                <a href="{result.url}">{result.title}</a>
                            </h2>
                            <f:if condition="{result.page}">
                                <span class="search-result-page">Seite: {result.page}</span>
                            </f:if>
                            <p class="search-result-abstract">{result.abstract}</p>
                            <a href="{result.url}" class="search-result-link">Zur Seite →</a>
                        </article>
                    </f:for>
                </div>
            </f:then>
            <f:else>
                <f:if condition="{searchQuery}">
                    <div class="no-results">
                        <p>Keine Ergebnisse gefunden. Versuchen Sie es mit anderen Suchbegriffen.</p>
                    </div>
                </f:if>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
